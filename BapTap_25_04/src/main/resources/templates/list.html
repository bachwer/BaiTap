<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Todo List</title>
</head>
<body>

<h2>Danh sách công việc</h2>

<a href="/add">➕ Thêm mới</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nội dung</th>
        <th>Ngày</th>
        <th>Status</th>
        <th>Priority</th>
    </tr>

    <!-- 🔥 chấm điểm phần này -->
    <tr th:each="t : ${todos}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.content}"></td>
        <td th:text="${t.dueDate}"></td>
        <td th:text="${t.status}"></td>
        <td th:text="${t.priority}"></td>
    </tr>
</table>

</body>
</html>
